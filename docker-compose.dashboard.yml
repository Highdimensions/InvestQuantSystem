services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: quant-dashboard
    # Use host network for better connectivity to external data sources
    network_mode: host
    volumes:
      # Persist dashboard data
      - ./reports/dashboard:/app/reports/dashboard
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
